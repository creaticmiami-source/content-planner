<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Content Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#F7F5F1;
    --paper-dim:#EFEBE3;
    --ink:#15140F;
    --ink-soft:#5B584E;
    --line:#DEDACD;
    --accent:#3B3370;
    --accent-soft:#EDEBF6;
    --amber:#C8801A;
    --amber-bg:#FBF0DE;
    --green:#2F7D5C;
    --green-bg:#E6F2EC;
    --red:#B23A2E;
    --red-bg:#FAEBE8;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .display{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;
    letter-spacing:.01em;
    text-transform:uppercase;
  }
  .mono{ font-family:'IBM Plex Mono',monospace; }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  /* ---------- layout shells ---------- */
  #app{min-height:100vh;}
  .hidden{display:none !important;}

  /* ---------- login ---------- */
  .auth-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(59,51,112,0.07), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(200,128,26,0.07), transparent 40%),
      var(--paper);
  }
  .auth-card{
    width:100%; max-width:380px; background:var(--white);
    border:1px solid var(--line); border-radius:4px; padding:40px 36px;
    box-shadow: 0 1px 0 var(--line);
  }
  .auth-eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--accent); margin:0 0 6px;
  }
  .auth-title{font-size:38px; line-height:.95; margin:0 0 28px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:6px; font-weight:500;}
  .field input{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px;
    background:var(--paper); font-size:14px; color:var(--ink);
  }
  .field input:focus{outline:2px solid var(--accent); outline-offset:1px; background:var(--white);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 18px; border-radius:3px; border:1px solid transparent;
    font-size:13px; font-weight:600; letter-spacing:.01em;
  }
  .btn-primary{background:var(--ink); color:var(--white); width:100%;}
  .btn-primary:hover{background:var(--accent);}
  .btn-ghost{background:transparent; border-color:var(--line); color:var(--ink);}
  .btn-ghost:hover{background:var(--paper-dim);}
  .auth-error{
    background:var(--red-bg); color:var(--red); font-size:13px; padding:10px 12px;
    border-radius:3px; margin-bottom:16px; display:none;
  }

  /* ---------- team shell ---------- */
  .team-shell{display:flex; min-height:100vh;}
  .sidebar{
    width:240px; flex-shrink:0; background:var(--white); border-right:1px solid var(--line);
    padding:24px 18px; display:flex; flex-direction:column;
  }
  .brand{display:flex; align-items:baseline; gap:8px; margin-bottom:28px;}
  .brand .display{font-size:22px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .side-label{
    font-family:'IBM Plex Mono'; font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft); margin:18px 0 10px;
  }
  .client-list{list-style:none; margin:0; padding:0; flex:1; overflow-y:auto;}
  .client-item{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:3px;
    font-size:13.5px; font-weight:500; margin-bottom:2px; cursor:pointer; color:var(--ink-soft);
  }
  .client-item:hover{background:var(--paper-dim);}
  .client-item.active{background:var(--accent-soft); color:var(--accent);}
  .client-swatch{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .add-client-btn{
    width:100%; text-align:left; padding:9px 10px; border-radius:3px; border:1px dashed var(--line);
    background:transparent; color:var(--ink-soft); font-size:13px; margin-top:8px;
  }
  .add-client-btn:hover{border-color:var(--accent); color:var(--accent);}
  .sidebar-foot{font-size:11.5px; color:var(--ink-soft); padding-top:14px; border-top:1px solid var(--line);}
  .logout-link{background:none; border:none; color:var(--ink-soft); font-size:12px; padding:0; text-decoration:underline; margin-top:6px;}

  .main{flex:1; padding:28px 36px; overflow-x:auto;}
  .main-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:14px;}
  .month-nav{display:flex; align-items:center; gap:14px;}
  .month-nav button{background:var(--white); border:1px solid var(--line); border-radius:3px; width:30px; height:30px; font-size:14px;}
  .month-title{font-size:30px;}
  .top-actions{display:flex; gap:10px; align-items:center;}
  .link-pill{
    display:flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--line);
    border-radius:20px; padding:6px 14px 6px 6px; font-size:12px;
  }
  .link-pill .lp-dot{width:14px;height:14px;border-radius:50%;}

  /* calendar grid */
  .cal-grid{display:grid; grid-template-columns:repeat(7,minmax(140px,1fr)); border-top:1px solid var(--line); border-left:1px solid var(--line); min-width:980px;}
  .cal-dow{
    font-family:'IBM Plex Mono'; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-soft); padding:8px 10px; border-right:1px solid var(--line); border-bottom:1px solid var(--line);
    background:var(--paper-dim);
  }
  .cal-cell{
    border-right:1px solid var(--line); border-bottom:1px solid var(--line); min-height:118px;
    padding:8px; background:var(--white); position:relative;
  }
  .cal-cell.outside{background:var(--paper);}
  .cal-cell.today .cal-daynum{color:var(--accent);}
  .cal-daynum{font-family:'IBM Plex Mono'; font-size:12px; color:var(--ink-soft); margin-bottom:6px; display:flex; justify-content:space-between;}
  .cal-add{opacity:0; background:none; border:none; color:var(--accent); font-size:15px; line-height:1;}
  .cal-cell:hover .cal-add{opacity:1;}
  .post-card{
    background:var(--paper-dim); border-left:3px solid var(--accent); border-radius:2px;
    padding:5px 7px; margin-bottom:5px; font-size:11.5px; cursor:pointer; line-height:1.3;
  }
  .post-card .pc-plat{font-family:'IBM Plex Mono'; font-size:9.5px; text-transform:uppercase; color:var(--ink-soft); display:flex; justify-content:space-between; align-items:center;}
  .post-card .pc-copy{margin-top:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .status-flag{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .status-flag.pending{background:var(--amber);}
  .status-flag.approved{background:var(--green);}
  .status-flag.rejected{background:var(--red);}

  /* ---------- client portal ---------- */
  .portal-header{
    padding:32px 36px 22px; border-bottom:1px solid var(--line); background:var(--white);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
  }
  .portal-client{display:flex; align-items:center; gap:12px;}
  .portal-avatar{width:40px;height:40px;border-radius:8px; flex-shrink:0;}
  .portal-eyebrow{font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft);}
  .portal-title{font-size:28px;}
  .legend{display:flex; gap:16px; font-size:12px; color:var(--ink-soft);}
  .legend span{display:flex; align-items:center; gap:6px;}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(21,20,15,0.55); display:flex; align-items:center;
    justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--white); width:100%; max-width:520px; border-radius:6px; max-height:88vh;
    overflow-y:auto; padding:28px;
  }
  .modal-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;}
  .modal-close{background:none; border:none; font-size:20px; color:var(--ink-soft); line-height:1;}
  .field textarea{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px; background:var(--paper); font-size:14px; resize:vertical; min-height:80px;}
  .field select{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px; background:var(--paper); font-size:14px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .media-preview{width:100%; border-radius:4px; margin-bottom:14px; max-height:280px; object-fit:cover; background:var(--paper-dim);}
  .upload-zone{
    border:1.5px dashed var(--line); border-radius:4px; padding:22px; text-align:center; font-size:13px;
    color:var(--ink-soft); margin-bottom:14px; cursor:pointer;
  }
  .upload-zone:hover{border-color:var(--accent); color:var(--accent);}
  .status-row{display:flex; gap:8px; margin:16px 0;}
  .status-btn{flex:1; padding:10px; border-radius:3px; border:1px solid var(--line); background:var(--white); font-size:13px; font-weight:600;}
  .status-btn.approve.active{background:var(--green-bg); border-color:var(--green); color:var(--green);}
  .status-btn.reject.active{background:var(--red-bg); border-color:var(--red); color:var(--red);}
  .status-btn:not(.active):hover{background:var(--paper-dim);}
  .comments{border-top:1px solid var(--line); margin-top:18px; padding-top:14px;}
  .comment{padding:9px 0; border-bottom:1px solid var(--paper-dim); font-size:13px;}
  .comment-meta{font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--ink-soft); margin-bottom:3px; text-transform:uppercase; letter-spacing:.04em;}
  .comment-form{display:flex; gap:8px; margin-top:12px;}
  .comment-form input[type=text]{flex:1; padding:9px 10px; border:1px solid var(--line); border-radius:3px; background:var(--paper); font-size:13px;}

  .empty-token{
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:30px;
    color:var(--ink-soft); font-size:14px;
  }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--white);
    padding:10px 18px; border-radius:4px; font-size:13px; z-index:100; opacity:0; transition:opacity .25s;
  }
  .toast.show{opacity:1;}
  @media(max-width:760px){
    .sidebar{display:none;}
    .main{padding:18px;}
    .cal-grid{grid-template-columns:repeat(7,minmax(120px,1fr));}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================
   CONFIGURA AQUI tus credenciales de Supabase
   (Supabase Dashboard > Project Settings > API)
========================================================= */
const SUPABASE_URL = "https://xmpacoggqiklubrpunmi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_qgLiy2jKRcct6_CdKu2noQ_WUFwJyfQ";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');
const PLATFORMS = ['instagram','tiktok','facebook','google','otro'];
const DOWS = ['LUN','MAR','MIE','JUE','VIE','SAB','DOM'];

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(d){ return new Date(d+'T00:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'}); }

/* =========================================================
   ROUTER: si hay ?token= en la URL -> Portal de Cliente
   si no -> App interna del equipo (requiere login)
========================================================= */
const params = new URLSearchParams(window.location.search);
const clientToken = params.get('token');

if (clientToken) {
  renderClientPortal(clientToken);
} else {
  initTeamApp();
}

/* =========================================================
   PORTAL DE CLIENTE (sin login, acceso por token)
========================================================= */
async function renderClientPortal(token){
  app.innerHTML = `<div class="empty-token">Cargando calendario…</div>`;
  const { data, error } = await sb.rpc('get_calendar_by_token', { p_token: token });
  if (error || !data || data.error){
    app.innerHTML = `<div class="empty-token">Este link no es válido o expiró.<br>Contacta a tu agencia para obtener un nuevo link.</div>`;
    return;
  }
  let state = { client: data.client, posts: data.posts, monthOffset: 0 };
  drawPortal();

  function drawPortal(){
    const today = new Date();
    const view = new Date(today.getFullYear(), today.getMonth() + state.monthOffset, 1);
    app.innerHTML = `
      <div class="portal-header">
        <div class="portal-client">
          <div class="portal-avatar" style="background:${state.client.color}"></div>
          <div>
            <div class="portal-eyebrow">Calendario de contenido</div>
            <div class="display portal-title">${esc(state.client.name)}</div>
          </div>
        </div>
        <div class="legend">
          <span><span class="status-flag pending"></span> Pendiente</span>
          <span><span class="status-flag approved"></span> Aprobado</span>
          <span><span class="status-flag rejected"></span> Rechazado</span>
        </div>
      </div>
      <div class="main">
        <div class="main-top">
          <div class="month-nav">
            <button id="prevM">‹</button>
            <div class="display month-title">${view.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div>
            <button id="nextM">›</button>
          </div>
        </div>
        <div id="calHolder"></div>
      </div>
    `;
    document.getElementById('prevM').onclick = ()=>{ state.monthOffset--; drawPortal(); };
    document.getElementById('nextM').onclick = ()=>{ state.monthOffset++; drawPortal(); };
    buildCalendarGrid(document.getElementById('calHolder'), view, state.posts, (post)=>openClientModal(post, token, refreshPortal));
  }
  async function refreshPortal(){
    const { data } = await sb.rpc('get_calendar_by_token', { p_token: token });
    if (data && !data.error){ state.posts = data.posts; drawPortal(); }
  }
}

function openClientModal(post, token, onUpdate){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="mono" style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;">${esc(post.platform)} · ${fmtDate(post.scheduled_date)}${post.scheduled_time? ' · '+post.scheduled_time.slice(0,5):''}</div>
        </div>
        <button class="modal-close">&times;</button>
      </div>
      ${post.media_url ? (post.media_type === 'video'
        ? `<video class="media-preview" src="${esc(post.media_url)}" controls></video>`
        : `<img class="media-preview" src="${esc(post.media_url)}" />`) : ''}
      <p style="font-size:14px; line-height:1.5; white-space:pre-wrap;">${esc(post.copy)}</p>
      <div class="status-row">
        <button class="status-btn approve ${post.status==='approved'?'active':''}" data-s="approved">✓ Aprobar</button>
        <button class="status-btn reject ${post.status==='rejected'?'active':''}" data-s="rejected">✕ Rechazar</button>
      </div>
      <div class="comments">
        <div class="side-label" style="margin-top:0;">Comentarios</div>
        <div id="commentList">
          ${post.comments.length ? post.comments.map(c=>`
            <div class="comment">
              <div class="comment-meta">${esc(c.author_name)} · ${c.author_type==='team'?'agencia':'cliente'}</div>
              ${esc(c.comment_text)}
            </div>`).join('') : '<div style="font-size:13px;color:var(--ink-soft);">Sin comentarios aún.</div>'}
        </div>
        <div class="comment-form">
          <input type="text" id="cAuthor" placeholder="Tu nombre" style="max-width:120px;">
          <input type="text" id="cText" placeholder="Escribe un comentario…">
          <button class="btn btn-primary" id="cSend" style="white-space:nowrap;">Enviar</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').onclick = ()=>overlay.remove();
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });

  overlay.querySelectorAll('.status-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const { error } = await sb.rpc('update_post_status_by_token', { p_token: token, p_post_id: post.id, p_status: btn.dataset.s });
      if (error){ toast('Error al actualizar'); return; }
      toast('Estado actualizado');
      overlay.remove();
      onUpdate();
    };
  });
  overlay.querySelector('#cSend').onclick = async ()=>{
    const author = overlay.querySelector('#cAuthor').value.trim() || 'Cliente';
    const text = overlay.querySelector('#cText').value.trim();
    if (!text) return;
    const { error } = await sb.rpc('add_comment_by_token', { p_token: token, p_post_id: post.id, p_author_name: author, p_comment: text });
    if (error){ toast('Error al comentar'); return; }
    overlay.remove();
    onUpdate();
    setTimeout(()=>toast('Comentario enviado'), 200);
  };
}

/* =========================================================
   APP INTERNA DEL EQUIPO
========================================================= */
async function initTeamApp(){
  const { data: { session } } = await sb.auth.getSession();
  if (session) { renderTeamShell(session); }
  else { renderLogin(); }

  sb.auth.onAuthStateChange((event, session)=>{
    if (event === 'SIGNED_IN') renderTeamShell(session);
    if (event === 'SIGNED_OUT') renderLogin();
  });
}

function renderLogin(){
  app.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <p class="auth-eyebrow">Acceso de equipo</p>
        <h1 class="display auth-title">Content<br>Planner</h1>
        <div class="auth-error" id="authErr"></div>
        <div class="field"><label>Email</label><input type="email" id="loginEmail" autocomplete="username"></div>
        <div class="field"><label>Contraseña</label><input type="password" id="loginPass" autocomplete="current-password"></div>
        <button class="btn btn-primary" id="loginBtn">Entrar</button>
      </div>
    </div>
  `;
  document.getElementById('loginBtn').onclick = async ()=>{
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPass').value;
    const errBox = document.getElementById('authErr');
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error){ errBox.textContent = 'Email o contraseña incorrectos.'; errBox.style.display='block'; }
  };
}

let TEAM_STATE = { clients: [], activeClientId: null, posts: [], monthOffset: 0 };

async function renderTeamShell(session){
  await loadClients();
  if (!TEAM_STATE.activeClientId && TEAM_STATE.clients.length) {
    TEAM_STATE.activeClientId = TEAM_STATE.clients[0].id;
  }
  drawTeamShell();
  if (TEAM_STATE.activeClientId) await loadPosts();
  drawCalendarSection();
}

async function loadClients(){
  const { data, error } = await sb.from('clients').select('*').order('created_at', { ascending: true });
  if (!error) TEAM_STATE.clients = data || [];
}
async function loadPosts(){
  const { data, error } = await sb.from('posts').select('*').eq('client_id', TEAM_STATE.activeClientId).order('scheduled_date', { ascending: true });
  TEAM_STATE.posts = error ? [] : data;
}

function drawTeamShell(){
  app.innerHTML = `
    <div class="team-shell">
      <div class="sidebar">
        <div class="brand"><span class="display">Planner</span><span class="dot"></span></div>
        <div class="side-label">Clientes</div>
        <ul class="client-list" id="clientList"></ul>
        <button class="add-client-btn" id="addClientBtn">+ Nuevo cliente</button>
        <div class="sidebar-foot">
          ${ (sb.auth.getSession && '') || ''}
          <button class="logout-link" id="logoutBtn">Cerrar sesión</button>
        </div>
      </div>
      <div class="main">
        <div class="main-top" id="mainTop"></div>
        <div id="calHolder"></div>
      </div>
    </div>
  `;
  document.getElementById('logoutBtn').onclick = ()=> sb.auth.signOut();
  document.getElementById('addClientBtn').onclick = createClientFlow;
  drawClientList();
}

function drawClientList(){
  const ul = document.getElementById('clientList');
  ul.innerHTML = TEAM_STATE.clients.map(c => `
    <li class="client-item ${c.id===TEAM_STATE.activeClientId?'active':''}" data-id="${c.id}">
      <span class="client-swatch" style="background:${c.color}"></span>${esc(c.name)}
    </li>
  `).join('') || `<li style="font-size:12.5px;color:var(--ink-soft);padding:6px 10px;">Aún no tienes clientes.</li>`;
  ul.querySelectorAll('.client-item').forEach(li=>{
    li.onclick = async ()=>{
      TEAM_STATE.activeClientId = li.dataset.id;
      TEAM_STATE.monthOffset = 0;
      drawClientList();
      await loadPosts();
      drawCalendarSection();
    };
  });
}

async function createClientFlow(){
  const name = prompt('Nombre del cliente (ej. Tin Tin Miami):');
  if (!name) return;
  const colors = ['#3B3370','#C8801A','#2F7D5C','#B23A2E','#1F6F8B','#7A3B69'];
  const color = colors[TEAM_STATE.clients.length % colors.length];
  const { data, error } = await sb.from('clients').insert({ name, color }).select().single();
  if (error){ toast('Error creando cliente'); return; }
  TEAM_STATE.clients.push(data);
  TEAM_STATE.activeClientId = data.id;
  drawClientList();
  await loadPosts();
  drawCalendarSection();
  toast('Cliente creado');
}

function activeClient(){ return TEAM_STATE.clients.find(c=>c.id===TEAM_STATE.activeClientId); }

function drawCalendarSection(){
  const top = document.getElementById('mainTop');
  const client = activeClient();
  const today = new Date();
  const view = new Date(today.getFullYear(), today.getMonth() + TEAM_STATE.monthOffset, 1);

  if (!client){
    top.innerHTML = '';
    document.getElementById('calHolder').innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:40px 0;">Crea tu primer cliente para empezar a planear contenido.</div>`;
    return;
  }

  top.innerHTML = `
    <div class="month-nav">
      <button id="prevM">‹</button>
      <div class="display month-title">${view.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div>
      <button id="nextM">›</button>
    </div>
    <div class="top-actions">
      <div class="link-pill">
        <span class="lp-dot" style="background:${client.color}"></span>
        Link de ${esc(client.name)}
      </div>
      <button class="btn btn-ghost" id="copyLinkBtn">Copiar link de cliente</button>
      <button class="btn btn-primary" id="newPostBtn">+ Nuevo post</button>
    </div>
  `;
  document.getElementById('prevM').onclick = ()=>{ TEAM_STATE.monthOffset--; drawCalendarSection(); };
  document.getElementById('nextM').onclick = ()=>{ TEAM_STATE.monthOffset++; drawCalendarSection(); };
  document.getElementById('copyLinkBtn').onclick = ()=>{
    const url = `${location.origin}${location.pathname}?token=${client.access_token}`;
    navigator.clipboard.writeText(url);
    toast('Link copiado al portapapeles');
  };
  document.getElementById('newPostBtn').onclick = ()=> openTeamPostModal(null, todayStr());

  buildCalendarGrid(document.getElementById('calHolder'), view, TEAM_STATE.posts, (post)=>openTeamPostModal(post), (dateStr)=>openTeamPostModal(null, dateStr));
}

function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }

/* shared calendar grid builder: works for both team + client views */
function buildCalendarGrid(holder, viewDate, posts, onOpenPost, onAddDay){
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // mon=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const todayStr_ = todayStr();

  const postsByDate = {};
  posts.forEach(p=>{ (postsByDate[p.scheduled_date] = postsByDate[p.scheduled_date]||[]).push(p); });

  let cells = '';
  // leading days
  for (let i=firstDow-1;i>=0;i--){
    cells += `<div class="cal-cell outside"><div class="cal-daynum">${daysInPrevMonth-i}</div></div>`;
  }
  for (let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayPosts = postsByDate[dateStr] || [];
    const isToday = dateStr === todayStr_;
    cells += `<div class="cal-cell ${isToday?'today':''}" data-date="${dateStr}">
      <div class="cal-daynum"><span>${d}</span>${onAddDay?`<button class="cal-add" data-date="${dateStr}">+</button>`:''}</div>
      ${dayPosts.map(p=>`
        <div class="post-card" data-id="${p.id}" style="border-left-color:${p.client_color||'var(--accent)'}">
          <div class="pc-plat"><span>${esc(p.platform)}</span><span class="status-flag ${p.status}"></span></div>
          <div class="pc-copy">${esc(p.copy || '(sin texto)')}</div>
        </div>`).join('')}
    </div>`;
  }
  // trailing days to complete grid (multiple of 7)
  const totalSoFar = firstDow + daysInMonth;
  const trailing = (7 - (totalSoFar % 7)) % 7;
  for (let i=1;i<=trailing;i++){
    cells += `<div class="cal-cell outside"><div class="cal-daynum">${i}</div></div>`;
  }

  holder.innerHTML = `
    <div class="cal-grid">
      ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
  `;
  holder.querySelectorAll('.post-card').forEach(card=>{
    card.onclick = (e)=>{
      e.stopPropagation();
      const post = posts.find(p=>p.id===card.dataset.id);
      if (post) onOpenPost(post);
    };
  });
  if (onAddDay){
    holder.querySelectorAll('.cal-add').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); onAddDay(btn.dataset.date); };
    });
  }
}

/* ---------- modal: crear / editar post (equipo) ---------- */
function openTeamPostModal(post, presetDate){
  const isEdit = !!post;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <div class="display" style="font-size:20px;">${isEdit?'Editar post':'Nuevo post'}</div>
        <button class="modal-close">&times;</button>
      </div>
      <div id="uploadArea">
        ${post?.media_url ? (post.media_type==='video'
          ? `<video class="media-preview" src="${esc(post.media_url)}" controls></video>`
          : `<img class="media-preview" src="${esc(post.media_url)}">`) : `
          <div class="upload-zone" id="uploadZone">Click para subir imagen o video</div>
          <input type="file" id="fileInput" accept="image/*,video/*" class="hidden">
        `}
      </div>
      <div class="field"><label>Copy / texto del post</label><textarea id="pCopy">${esc(post?.copy||'')}</textarea></div>
      <div class="row2">
        <div class="field"><label>Plataforma</label>
          <select id="pPlatform">${PLATFORMS.map(pl=>`<option ${post?.platform===pl?'selected':''}>${pl}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Fecha</label><input type="date" id="pDate" value="${post?.scheduled_date || presetDate || todayStr()}"></div>
      </div>
      <div class="field"><label>Hora (opcional)</label><input type="time" id="pTime" value="${post?.scheduled_time? post.scheduled_time.slice(0,5):''}"></div>
      ${isEdit ? `<div class="mono" style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;margin:6px 0 14px;">Estado actual: ${post.status}</div>` : ''}
      <div style="display:flex; gap:10px; margin-top:6px;">
        <button class="btn btn-primary" id="saveBtn" style="flex:1;">${isEdit?'Guardar cambios':'Crear post'}</button>
        ${isEdit?'<button class="btn btn-ghost" id="delBtn">Eliminar</button>':''}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').onclick = ()=>overlay.remove();
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });

  let pendingFile = null;
  const zone = overlay.querySelector('#uploadZone');
  const fileInput = overlay.querySelector('#fileInput');
  if (zone){
    zone.onclick = ()=> fileInput.click();
    fileInput.onchange = ()=>{
      pendingFile = fileInput.files[0];
      if (pendingFile) zone.textContent = `Listo: ${pendingFile.name}`;
    };
  }

  overlay.querySelector('#saveBtn').onclick = async ()=>{
    const copy = overlay.querySelector('#pCopy').value.trim();
    const platform = overlay.querySelector('#pPlatform').value;
    const scheduled_date = overlay.querySelector('#pDate').value;
    const scheduled_time = overlay.querySelector('#pTime').value || null;
    if (!scheduled_date){ toast('Selecciona una fecha'); return; }

    let media_url = post?.media_url || null;
    let media_type = post?.media_type || null;

    if (pendingFile){
      const ext = pendingFile.name.split('.').pop();
      const path = `${TEAM_STATE.activeClientId}/${crypto.randomUUID()}.${ext}`;
      const { error: upErr } = await sb.storage.from('content-media').upload(path, pendingFile);
      if (upErr){ toast('Error subiendo archivo'); return; }
      const { data: pub } = sb.storage.from('content-media').getPublicUrl(path);
      media_url = pub.publicUrl;
      media_type = pendingFile.type.startsWith('video') ? 'video' : 'image';
    }

    if (isEdit){
      const { error } = await sb.from('posts').update({ copy, platform, scheduled_date, scheduled_time, media_url, media_type, updated_at: new Date().toISOString() }).eq('id', post.id);
      if (error){ toast('Error guardando'); return; }
      toast('Post actualizado');
    } else {
      const { data: { user } } = await sb.auth.getUser();
      const { error } = await sb.from('posts').insert({ client_id: TEAM_STATE.activeClientId, copy, platform, scheduled_date, scheduled_time, media_url, media_type, created_by: user?.id, status:'pending' });
      if (error){ toast('Error creando post'); return; }
      toast('Post creado');
    }
    overlay.remove();
    await loadPosts();
    drawCalendarSection();
  };

  if (isEdit){
    overlay.querySelector('#delBtn').onclick = async ()=>{
      if (!confirm('¿Eliminar este post?')) return;
      const { error } = await sb.from('posts').delete().eq('id', post.id);
      if (error){ toast('Error eliminando'); return; }
      overlay.remove();
      await loadPosts();
      drawCalendarSection();
      toast('Post eliminado');
    };
  }
}
</script>

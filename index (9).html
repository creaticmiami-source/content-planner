<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Content Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#F7F5F1;
    --paper-dim:#EFEBE3;
    --ink:#15140F;
    --ink-soft:#5B584E;
    --line:#DEDACD;
    --accent:#3B3370;
    --accent-soft:#EDEBF6;
    --amber:#C8801A;
    --amber-bg:#FBF0DE;
    --green:#2F7D5C;
    --green-bg:#E6F2EC;
    --red:#B23A2E;
    --red-bg:#FAEBE8;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .display{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;
    letter-spacing:.01em;
    text-transform:uppercase;
  }
  .mono{ font-family:'IBM Plex Mono',monospace; }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  /* ---------- layout shells ---------- */
  #app{min-height:100vh;}
  .hidden{display:none !important;}

  /* ---------- login ---------- */
  .auth-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(59,51,112,0.07), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(200,128,26,0.07), transparent 40%),
      var(--paper);
  }
  .auth-card{
    width:100%; max-width:380px; background:var(--white);
    border:1px solid var(--line); border-radius:4px; padding:40px 36px;
    box-shadow: 0 1px 0 var(--line);
  }
  .auth-eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--accent); margin:0 0 6px;
  }
  .auth-title{font-size:38px; line-height:.95; margin:0 0 28px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:6px; font-weight:500;}
  .field input{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px;
    background:var(--paper); font-size:14px; color:var(--ink);
  }
  .field input:focus{outline:2px solid var(--accent); outline-offset:1px; background:var(--white);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 18px; border-radius:3px; border:1px solid transparent;
    font-size:13px; font-weight:600; letter-spacing:.01em;
  }
  .btn-primary{background:var(--ink); color:var(--white); width:100%;}
  .btn-primary:hover{background:var(--accent);}
  .btn-ghost{background:transparent; border-color:var(--line); color:var(--ink);}
  .btn-ghost:hover{background:var(--paper-dim);}
  .auth-error{
    background:var(--red-bg); color:var(--red); font-size:13px; padding:10px 12px;
    border-radius:3px; margin-bottom:16px; display:none;
  }

  /* ---------- team shell ---------- */
  .team-shell{display:flex; min-height:100vh;}
  .sidebar{
    width:240px; flex-shrink:0; background:var(--white); border-right:1px solid var(--line);
    padding:24px 18px; display:flex; flex-direction:column;
  }
  .brand{display:flex; align-items:baseline; gap:8px; margin-bottom:28px;}
  .brand .display{font-size:22px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .side-label{
    font-family:'IBM Plex Mono'; font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft); margin:18px 0 10px;
  }
  .client-list{list-style:none; margin:0; padding:0; flex:1; overflow-y:auto;}
  .client-item{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:3px;
    font-size:13.5px; font-weight:500; margin-bottom:2px; cursor:pointer; color:var(--ink-soft);
  }
  .client-item:hover{background:var(--paper-dim);}
  .client-item.active{background:var(--accent-soft); color:var(--accent);}
  .client-swatch{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .add-client-btn{
    width:100%; text-align:left; padding:9px 10px; border-radius:3px; border:1px dashed var(--line);
    background:transparent; color:var(--ink-soft); font-size:13px; margin-top:8px;
  }
  .add-client-btn:hover{border-color:var(--accent); color:var(--accent);}
  .sidebar-foot{font-size:11.5px; color:var(--ink-soft); padding-top:14px; border-top:1px solid var(--line);}
  .logout-link{background:none; border:none; color:var(--ink-soft); font-size:12px; padding:0; text-decoration:underline; margin-top:6px;}

  .main{flex:1; padding:28px 36px; overflow-x:auto;}
  .main-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:14px;}
  .month-nav{display:flex; align-items:center; gap:14px;}
  .month-nav button{background:var(--white); border:1px solid var(--line); border-radius:3px; width:30px; height:30px; font-size:14px;}
  .month-title{font-size:30px;}
  .top-actions{display:flex; gap:10px; align-items:center;}
  .link-pill{
    display:flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--line);
    border-radius:20px; padding:6px 14px 6px 6px; font-size:12px;
  }
  .link-pill .lp-dot{width:14px;height:14px;border-radius:50%;}

  /* calendar grid */
  .cal-grid{display:grid; grid-template-columns:repeat(7,minmax(140px,1fr)); border-top:1px solid var(--line); border-left:1px solid var(--line); min-width:980px;}
  .cal-dow{
    font-family:'IBM Plex Mono'; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-soft); padding:8px 10px; border-right:1px solid var(--line); border-bottom:1px solid var(--line);
    background:var(--paper-dim);
  }
  .cal-cell{
    border-right:1px solid var(--line); border-bottom:1px solid var(--line); min-height:118px;
    padding:8px; background:var(--white); position:relative;
  }
  .cal-cell.outside{background:var(--paper);}
  .cal-cell.today .cal-daynum{color:var(--accent);}
  .cal-daynum{font-family:'IBM Plex Mono'; font-size:12px; color:var(--ink-soft); margin-bottom:6px; display:flex; justify-content:space-between;}
  .cal-add{opacity:0; background:none; border:none; color:var(--accent); font-size:15px; line-height:1;}
  .cal-cell:hover .cal-add{opacity:1;}
  .post-card{
    background:var(--paper-dim); border-left:3px solid var(--accent); border-radius:2px;
    padding:5px 7px; margin-bottom:5px; font-size:11.5px; cursor:pointer; line-height:1.3;
  }
  .post-card .pc-plat{font-family:'IBM Plex Mono'; font-size:9.5px; text-transform:uppercase; color:var(--ink-soft); display:flex; justify-content:space-between; align-items:center;}
  .post-card .pc-copy{margin-top:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .status-flag{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .status-flag.pending{background:var(--amber);}
  .status-flag.approved{background:var(--green);}
  .status-flag.rejected{background:var(--red);}

  /* ---------- client portal ---------- */
  .portal-header{
    padding:32px 36px 22px; border-bottom:1px solid var(--line); background:var(--white);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
  }
  .portal-client{display:flex; align-items:center; gap:12px;}
  .portal-avatar{width:40px;height:40px;border-radius:8px; flex-shrink:0;}
  .portal-eyebrow{font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft);}
  .portal-title{font-size:28px;}
  .legend{display:flex; gap:16px; font-size:12px; color:var(--ink-soft);}
  .legend span{display:flex; align-items:center; gap:6px;}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(21,20,15,0.55); display:flex; align-items:center;
    justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--white); width:100%; max-width:520px; border-radius:6px; max-height:88vh;
    overflow-y:auto; padding:28px;
  }
  .modal-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;}
  .modal-close{background:none; border:none; font-size:20px; color:var(--ink-soft); line-height:1;}
  .field textarea{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px; background:var(--paper); font-size:14px; resize:vertical; min-height:80px;}
  .field select{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:3px; background:var(--paper); font-size:14px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .media-preview{width:100%; border-radius:4px; margin-bottom:14px; max-height:280px; object-fit:cover; background:var(--paper-dim);}
  /* galería de varias fotos (carrusel con scroll horizontal) */
  .media-gallery{
    display:flex; gap:8px; overflow-x:auto; margin-bottom:6px; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch; border-radius:4px;
  }
  .gal-item{position:relative; flex:0 0 100%; scroll-snap-align:center;}
  .gal-item img, .gal-item video{
    width:100%; max-height:280px; object-fit:contain; background:var(--paper-dim);
    border-radius:4px; display:block;
  }
  .gal-item img{cursor:zoom-in;}
  .gal-actions{position:absolute; top:8px; right:8px; display:flex; gap:6px;}
  .gal-btn{
    width:32px; height:32px; border-radius:4px; border:none; background:rgba(21,20,15,0.72);
    color:#fff; font-size:15px; display:flex; align-items:center; justify-content:center; padding:0;
  }
  .gal-btn:hover{background:var(--accent);}
  /* ---------- lightbox (visor grande) ---------- */
  .lightbox{
    position:fixed; inset:0; background:rgba(21,20,15,0.93); z-index:200;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px;
  }
  .lb-stage{flex:1; display:flex; align-items:center; justify-content:center; min-height:0; width:100%;}
  .lb-stage img, .lb-stage video{max-width:96vw; max-height:80vh; object-fit:contain; border-radius:4px;}
  .lb-close{position:absolute; top:12px; right:16px; background:none; border:none; color:#fff; font-size:32px; line-height:1; z-index:2;}
  .lb-bar{display:flex; align-items:center; gap:14px; padding:14px 0 4px; flex-wrap:wrap; justify-content:center;}
  .lb-nav{width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,0.35); background:transparent; color:#fff; font-size:19px;}
  .lb-nav:hover{background:rgba(255,255,255,0.15);}
  .lb-count{color:#fff; font-family:'IBM Plex Mono'; font-size:12px;}
  .lb-dl{padding:10px 18px; border-radius:3px; border:none; background:#fff; color:var(--ink); font-size:13px; font-weight:600;}
  .lb-dl:hover{background:var(--paper-dim);}
  .media-count{
    font-family:'IBM Plex Mono'; font-size:11px; color:var(--ink-soft); text-transform:uppercase;
    letter-spacing:.06em; margin-bottom:12px; text-align:center;
  }
  /* miniaturas en el modal de equipo */
  .thumb-grid{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
  .thumb{
    position:relative; width:76px; height:76px; border-radius:4px; overflow:hidden;
    border:1px solid var(--line); background:var(--paper-dim); flex-shrink:0;
  }
  .thumb img, .thumb video{width:100%; height:100%; object-fit:cover;}
  .thumb .thumb-x{
    position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%;
    background:rgba(21,20,15,0.75); color:#fff; border:none; font-size:11px; line-height:1;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .thumb .thumb-vid{
    position:absolute; bottom:2px; left:2px; background:rgba(21,20,15,0.75); color:#fff;
    font-size:8.5px; padding:1px 4px; border-radius:2px; font-family:'IBM Plex Mono'; text-transform:uppercase;
  }
  .thumb-add{
    width:76px; height:76px; border-radius:4px; border:1.5px dashed var(--line); background:transparent;
    color:var(--ink-soft); font-size:20px; flex-shrink:0;
  }
  .thumb-add:hover{border-color:var(--accent); color:var(--accent);}
  .pc-media-count{font-family:'IBM Plex Mono'; font-size:9px; color:var(--ink-soft);}
  .upload-zone{
    border:1.5px dashed var(--line); border-radius:4px; padding:22px; text-align:center; font-size:13px;
    color:var(--ink-soft); margin-bottom:14px; cursor:pointer;
  }
  .upload-zone:hover{border-color:var(--accent); color:var(--accent);}
  .status-row{display:flex; gap:8px; margin:16px 0;}
  .status-btn{flex:1; padding:10px; border-radius:3px; border:1px solid var(--line); background:var(--white); font-size:13px; font-weight:600;}
  .status-btn.approve.active{background:var(--green-bg); border-color:var(--green); color:var(--green);}
  .status-btn.reject.active{background:var(--red-bg); border-color:var(--red); color:var(--red);}
  .status-btn:not(.active):hover{background:var(--paper-dim);}
  .pc-comments{font-family:'IBM Plex Mono'; font-size:10px; color:var(--ink-soft); background:var(--paper-dim); border-radius:8px; padding:1px 5px; margin-left:4px;}
  .comments{border-top:1px solid var(--line); margin-top:18px; padding-top:14px;}
  .comment{padding:9px 0; border-bottom:1px solid var(--paper-dim); font-size:13px;}
  .comment-meta{font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--ink-soft); margin-bottom:3px; text-transform:uppercase; letter-spacing:.04em;}
  .comment-form{display:flex; gap:8px; margin-top:12px;}
  .comment-form input[type=text]{flex:1; padding:9px 10px; border:1px solid var(--line); border-radius:3px; background:var(--paper); font-size:13px;}

  .empty-token{
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:30px;
    color:var(--ink-soft); font-size:14px;
  }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--white);
    padding:10px 18px; border-radius:4px; font-size:13px; z-index:100; opacity:0; transition:opacity .25s;
  }
  .toast.show{opacity:1;}
  /* ---------- mobile client bar (hidden on desktop) ---------- */
  .mobile-bar{
    display:none; align-items:center; gap:8px; padding:12px 16px; background:var(--white);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10;
  }
  .mobile-bar select{
    flex:1; padding:9px 10px; border:1px solid var(--line); border-radius:3px; background:var(--paper);
    font-size:14px; font-weight:600; color:var(--ink);
  }
  .mobile-bar button{
    flex-shrink:0; width:36px; height:36px; border-radius:3px; border:1px solid var(--line);
    background:var(--white); font-size:16px; display:flex; align-items:center; justify-content:center;
  }
  .mobile-brand{
    display:none; align-items:center; gap:8px; padding:14px 16px 0;
  }

  @media(max-width:760px){
    .team-shell{flex-direction:column;}
    .sidebar{display:none;}
    .mobile-brand{display:flex;}
    .mobile-bar{display:flex;}
    .main{padding:14px;}
    .main-top{margin-bottom:14px;}
    .month-title{font-size:22px;}
    .top-actions{width:100%; flex-wrap:wrap;}
    .top-actions .link-pill{display:none;}
    .top-actions .btn{flex:1; padding:10px 8px; font-size:12.5px;}
    .cal-grid{grid-template-columns:repeat(7,minmax(92px,1fr)); min-width:644px;}
    .main{overflow-x:auto;}
    .cal-cell{min-height:90px; padding:5px;}
    .cal-daynum{font-size:10.5px;}
    .post-card{font-size:10px; padding:4px 5px;}
    .modal{padding:20px 16px; max-width:100%; border-radius:0; max-height:100vh; min-height:100vh;}
    .overlay{padding:0;}
    .row2{grid-template-columns:1fr;}
    .portal-header{padding:20px 16px;}
    .portal-title{font-size:22px;}
    .legend{width:100%; justify-content:space-between; font-size:11px;}
    .auth-card{padding:28px 22px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================
   CONFIGURA AQUI tus credenciales de Supabase
   (Supabase Dashboard > Project Settings > API)
========================================================= */
const SUPABASE_URL = "https://xmpacoggqiklubrpunmi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_qgLiy2jKRcct6_CdKu2noQ_WUFwJyfQ";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');
const PLATFORMS = ['instagram','tiktok','facebook','google','otro'];
const DOWS = ['LUN','MAR','MIE','JUE','VIE','SAB','DOM'];

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(d){ return new Date(d+'T00:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'}); }

/* Devuelve SIEMPRE un array [{url, type}] — soporta posts viejos (media_url)
   y posts nuevos (columna media jsonb con varios archivos) */
function getMedia(post){
  if (!post) return [];
  let arr = post.media;
  if (typeof arr === 'string'){ try { arr = JSON.parse(arr); } catch(e){ arr = null; } }
  if (Array.isArray(arr) && arr.length) return arr.filter(m=>m && m.url);
  if (post.media_url) return [{ url: post.media_url, type: post.media_type || 'image' }];
  return [];
}

/* Galería (carrusel horizontal) para ver los archivos de un post.
   Cada archivo tiene botón de ver grande (⛶) y de descargar (⤓).
   Después de insertar el HTML hay que llamar wireGallery(container, mediaArr). */
function galleryHTML(mediaArr){
  if (!mediaArr.length) return '';
  const items = mediaArr.map((m, i) => `
    <div class="gal-item">
      ${m.type === 'video'
        ? `<video src="${esc(m.url)}" controls preload="metadata"></video>`
        : `<img src="${esc(m.url)}" data-lb="${i}" />`}
      <div class="gal-actions">
        <button class="gal-btn gal-expand" data-i="${i}" title="Ver en grande">⛶</button>
        <button class="gal-btn gal-dl" data-i="${i}" title="Descargar">⤓</button>
      </div>
    </div>`).join('');
  const counter = mediaArr.length > 1
    ? `<div class="media-count">${mediaArr.length} archivos — desliza para ver &rsaquo;</div>` : '';
  return `<div class="media-gallery">${items}</div>${counter}`;
}

function wireGallery(container, mediaArr){
  container.querySelectorAll('.gal-expand').forEach(b=>{
    b.onclick = (e)=>{ e.stopPropagation(); openLightbox(mediaArr, parseInt(b.dataset.i,10)); };
  });
  container.querySelectorAll('.gal-dl').forEach(b=>{
    b.onclick = (e)=>{ e.stopPropagation(); downloadMedia(mediaArr[parseInt(b.dataset.i,10)].url); };
  });
  container.querySelectorAll('img[data-lb]').forEach(img=>{
    img.onclick = ()=> openLightbox(mediaArr, parseInt(img.dataset.lb,10));
  });
}

/* Descarga forzada del archivo (funciona con Supabase Storage) */
async function downloadMedia(url){
  try{
    toast('Descargando…');
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = decodeURIComponent((url.split('/').pop() || 'archivo').split('?')[0]);
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=> URL.revokeObjectURL(a.href), 5000);
  } catch(e){
    /* si el navegador bloquea la descarga, al menos abrirlo en pestaña nueva */
    window.open(url, '_blank');
  }
}

/* Visor grande a pantalla completa, con navegación y descarga */
function openLightbox(mediaArr, startIndex){
  let idx = startIndex || 0;
  const lb = document.createElement('div');
  lb.className = 'lightbox';

  function draw(){
    const m = mediaArr[idx];
    lb.innerHTML = `
      <button class="lb-close" title="Cerrar">&times;</button>
      <div class="lb-stage">
        ${m.type === 'video'
          ? `<video src="${esc(m.url)}" controls autoplay></video>`
          : `<img src="${esc(m.url)}" />`}
      </div>
      <div class="lb-bar">
        ${mediaArr.length > 1 ? `<button class="lb-nav" id="lbPrev">‹</button><span class="lb-count">${idx+1} / ${mediaArr.length}</span><button class="lb-nav" id="lbNext">›</button>` : ''}
        <button class="lb-dl" id="lbDl">⤓ Descargar</button>
      </div>
    `;
    lb.querySelector('.lb-close').onclick = close;
    const prev = lb.querySelector('#lbPrev'), next = lb.querySelector('#lbNext');
    if (prev) prev.onclick = ()=>{ idx = (idx - 1 + mediaArr.length) % mediaArr.length; draw(); };
    if (next) next.onclick = ()=>{ idx = (idx + 1) % mediaArr.length; draw(); };
    lb.querySelector('#lbDl').onclick = ()=> downloadMedia(mediaArr[idx].url);
  }
  function onKey(e){
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft' && mediaArr.length > 1){ idx = (idx - 1 + mediaArr.length) % mediaArr.length; draw(); }
    if (e.key === 'ArrowRight' && mediaArr.length > 1){ idx = (idx + 1) % mediaArr.length; draw(); }
  }
  function close(){ document.removeEventListener('keydown', onKey); lb.remove(); }

  lb.addEventListener('click', e=>{ if (e.target === lb || e.target.classList.contains('lb-stage')) close(); });
  document.addEventListener('keydown', onKey);
  draw();
  document.body.appendChild(lb);
}

function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }

/* shared calendar grid builder: works for both team + client views */
function buildCalendarGrid(holder, viewDate, posts, onOpenPost, onAddDay){
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // mon=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const todayStr_ = todayStr();

  const postsByDate = {};
  posts.forEach(p=>{ (postsByDate[p.scheduled_date] = postsByDate[p.scheduled_date]||[]).push(p); });

  let cells = '';
  // leading days
  for (let i=firstDow-1;i>=0;i--){
    cells += `<div class="cal-cell outside"><div class="cal-daynum">${daysInPrevMonth-i}</div></div>`;
  }
  for (let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayPosts = postsByDate[dateStr] || [];
    const isToday = dateStr === todayStr_;
    cells += `<div class="cal-cell ${isToday?'today':''}" data-date="${dateStr}">
      <div class="cal-daynum"><span>${d}</span>${onAddDay?`<button class="cal-add" data-date="${dateStr}">+</button>`:''}</div>
      ${dayPosts.map(p=>`
        <div class="post-card" data-id="${p.id}" style="border-left-color:${p.client_color||'var(--accent)'}">
          <div class="pc-plat"><span>${esc(p.platform)}${getMedia(p).length>1?` <span class="pc-media-count">·${getMedia(p).length}📷</span>`:''}${(p.comments&&p.comments.length)?` <span class="pc-comments">💬${p.comments.length}</span>`:''}</span><span class="status-flag ${p.status}"></span></div>
          <div class="pc-copy">${esc(p.copy || '(sin texto)')}</div>
        </div>`).join('')}
    </div>`;
  }
  // trailing days to complete grid (multiple of 7)
  const totalSoFar = firstDow + daysInMonth;
  const trailing = (7 - (totalSoFar % 7)) % 7;
  for (let i=1;i<=trailing;i++){
    cells += `<div class="cal-cell outside"><div class="cal-daynum">${i}</div></div>`;
  }

  holder.innerHTML = `
    <div class="cal-grid">
      ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
  `;
  holder.querySelectorAll('.post-card').forEach(card=>{
    card.onclick = (e)=>{
      e.stopPropagation();
      const post = posts.find(p=>p.id===card.dataset.id);
      if (post) onOpenPost(post);
    };
  });
  if (onAddDay){
    holder.querySelectorAll('.cal-add').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); onAddDay(btn.dataset.date); };
    });
  }
}

/* ---------- modal: crear / editar post (equipo) ---------- */
function openTeamPostModal(post, presetDate){
  const isEdit = !!post;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <div class="display" style="font-size:20px;">${isEdit?'Editar post':'Nuevo post'}</div>
        <button class="modal-close">&times;</button>
      </div>

        <div class="side-label" style="margin-top:0;">Fotos / videos</div>
        <div class="thumb-grid" id="thumbGrid"></div>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple class="hidden">
      </div>
      <div class="field"><label>Copy / texto del post</label><textarea id="pCopy">${esc(post?.copy||'')}</textarea></div>
      <div class="row2">
        <div class="field"><label>Plataforma</label>
          <select id="pPlatform">${PLATFORMS.map(pl=>`<option ${post?.platform===pl?'selected':''}>${pl}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Fecha</label><input type="date" id="pDate" value="${post?.scheduled_date || presetDate || todayStr()}"></div>
      </div>
      <div class="field"><label>Hora (opcional)</label><input type="time" id="pTime" value="${post?.scheduled_time? post.scheduled_time.slice(0,5):''}"></div>
      ${isEdit ? `<div class="mono" style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;margin:6px 0 14px;">Estado actual: ${post.status}</div>` : ''}
      <div style="display:flex; gap:10px; margin-top:6px;">
        <button class="btn btn-primary" id="saveBtn" style="flex:1;">${isEdit?'Guardar cambios':'Crear post'}</button>
        ${isEdit?'<button class="btn btn-ghost" id="delBtn">Eliminar</button>':''}
      </div>
      ${isEdit ? `
      <div class="comments">
        <div class="side-label" style="margin-top:0;">Comentarios ${ (post.comments&&post.comments.length) ? `(${post.comments.length})` : '' }</div>
        <div id="teamCommentList">
          ${(post.comments&&post.comments.length) ? post.comments.map(c=>`
            <div class="comment">
              <div class="comment-meta">${esc(c.author_name)} · ${c.author_type==='team'?'agencia':'cliente'}${c.created_at?` · ${fmtDate(c.created_at.slice(0,10))}`:''}</div>
              ${esc(c.comment_text)}
            </div>`).join('') : '<div style="font-size:13px;color:var(--ink-soft);">El cliente aún no ha comentado.</div>'}
        </div>
        <div class="comment-form">
          <input type="text" id="tcAuthor" placeholder="Tu nombre" style="max-width:120px;" value="${esc(localStorage.getItem('plannerTeamName')||'')}">
          <input type="text" id="tcText" placeholder="Responder al cliente…">
          <button class="btn btn-primary" id="tcSend" style="white-space:nowrap;">Enviar</button>
        </div>
      </div>` : ''}
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').onclick = ()=>overlay.remove();
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });

  /* estado de medios: los ya guardados + los nuevos pendientes de subir */
  let existingMedia = getMedia(post);          // [{url, type}]
  let pendingFiles = [];                        // File[] nuevos
  const fileInput = overlay.querySelector('#fileInput');
  const thumbGrid = overlay.querySelector('#thumbGrid');

  function drawThumbs(){
    /* previews de los pendientes (blob local) para poder verlos grandes también */
    const pendingPreviews = pendingFiles.map(f => ({ url: URL.createObjectURL(f), type: f.type.startsWith('video') ? 'video' : 'image' }));
    const previewArr = [...existingMedia, ...pendingPreviews];

    let html = '';
    existingMedia.forEach((m, i)=>{
      html += `<div class="thumb" data-kind="existing" data-i="${i}" data-p="${i}">
        ${m.type==='video' ? `<video src="${esc(m.url)}" preload="metadata"></video><span class="thumb-vid">video</span>` : `<img src="${esc(m.url)}">`}
        <button class="thumb-x" title="Quitar">&times;</button>
      </div>`;
    });
    pendingPreviews.forEach((m, i)=>{
      html += `<div class="thumb" data-kind="pending" data-i="${i}" data-p="${existingMedia.length + i}">
        ${m.type==='video' ? `<video src="${m.url}" preload="metadata"></video><span class="thumb-vid">video</span>` : `<img src="${m.url}">`}
        <button class="thumb-x" title="Quitar">&times;</button>
      </div>`;
    });
    html += `<button class="thumb-add" id="thumbAdd" title="Agregar fotos o videos">+</button>`;
    thumbGrid.innerHTML = html;

    thumbGrid.querySelector('#thumbAdd').onclick = ()=> fileInput.click();
    thumbGrid.querySelectorAll('.thumb').forEach(t=>{
      t.onclick = ()=> openLightbox(previewArr, parseInt(t.dataset.p, 10));
    });
    thumbGrid.querySelectorAll('.thumb .thumb-x').forEach(x=>{
      x.onclick = (e)=>{
        e.stopPropagation();
        const t = x.closest('.thumb');
        const i = parseInt(t.dataset.i, 10);
        if (t.dataset.kind === 'existing') existingMedia.splice(i, 1);
        else pendingFiles.splice(i, 1);
        drawThumbs();
      };
    });
  }

  fileInput.onchange = ()=>{
    const files = Array.from(fileInput.files || []);
    for (const f of files){
      if (f.size > 50 * 1024 * 1024){
        toast(`"${f.name}" pesa más de 50MB, comprímelo primero`);
        continue;
      }
      pendingFiles.push(f);
    }
    fileInput.value = '';
    drawThumbs();
  };
  drawThumbs();

  overlay.querySelector('#saveBtn').onclick = async ()=>{
    const saveBtn = overlay.querySelector('#saveBtn');
    const copy = overlay.querySelector('#pCopy').value.trim();
    const platform = overlay.querySelector('#pPlatform').value;
    const scheduled_date = overlay.querySelector('#pDate').value;
    const scheduled_time = overlay.querySelector('#pTime').value || null;
    if (!scheduled_date){ toast('Selecciona una fecha'); return; }

    const originalLabel = saveBtn.textContent;
    saveBtn.disabled = true;

    /* subir todos los archivos nuevos, uno por uno */
    const finalMedia = [...existingMedia];
    for (let i = 0; i < pendingFiles.length; i++){
      const f = pendingFiles[i];
      saveBtn.textContent = `Subiendo ${i+1} de ${pendingFiles.length}…`;
      const ext = f.name.split('.').pop();
      const path = `${TEAM_STATE.activeClientId}/${crypto.randomUUID()}.${ext}`;
      const { error: upErr } = await sb.storage.from('content-media').upload(path, f);
      if (upErr){
        toast(`Error subiendo "${f.name}": ` + (upErr.message || 'revisa que el bucket exista'));
        saveBtn.textContent = originalLabel;
        saveBtn.disabled = false;
        return;
      }
      const { data: pub } = sb.storage.from('content-media').getPublicUrl(path);
      finalMedia.push({ url: pub.publicUrl, type: f.type.startsWith('video') ? 'video' : 'image' });
    }
    saveBtn.textContent = 'Guardando…';

    /* media_url/media_type se mantienen (primer archivo) por compatibilidad */
    const media_url = finalMedia.length ? finalMedia[0].url : null;
    const media_type = finalMedia.length ? finalMedia[0].type : null;
    const media = finalMedia;

    if (isEdit){
      const { error } = await sb.from('posts').update({ copy, platform, scheduled_date, scheduled_time, media, media_url, media_type, updated_at: new Date().toISOString() }).eq('id', post.id);
      if (error){ toast('Error guardando: ' + error.message); saveBtn.textContent = originalLabel; saveBtn.disabled = false; return; }
      toast('Post actualizado');
    } else {
      const { data: { user } } = await sb.auth.getUser();
      const { error } = await sb.from('posts').insert({ client_id: TEAM_STATE.activeClientId, copy, platform, scheduled_date, scheduled_time, media, media_url, media_type, created_by: user?.id, status:'pending' });
      if (error){ toast('Error creando post: ' + error.message); saveBtn.textContent = originalLabel; saveBtn.disabled = false; return; }
      toast('Post creado');
    }
    overlay.remove();
    await loadPosts();
    drawCalendarSection();
  };

  if (isEdit){
    overlay.querySelector('#tcSend').onclick = async ()=>{
      const author = overlay.querySelector('#tcAuthor').value.trim() || 'Agencia';
      const text = overlay.querySelector('#tcText').value.trim();
      if (!text) return;
      localStorage.setItem('plannerTeamName', author);
      const { error } = await sb.from('comments').insert({ post_id: post.id, author_name: author, author_type: 'team', comment_text: text });
      if (error){ toast('Error al comentar: ' + error.message); return; }
      /* refrescar lista dentro del modal sin cerrarlo */
      const list = overlay.querySelector('#teamCommentList');
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerHTML = `<div class="comment-meta">${esc(author)} · agencia</div>${esc(text)}`;
      if (list.querySelector('div[style]')) list.innerHTML = '';
      list.appendChild(div);
      overlay.querySelector('#tcText').value = '';
      toast('Comentario enviado');
      loadPosts().then(drawCalendarSection);
    };
    overlay.querySelector('#delBtn').onclick = async ()=>{
      if (!confirm('¿Eliminar este post?')) return;
      const { error } = await sb.from('posts').delete().eq('id', post.id);
      if (error){ toast('Error eliminando'); return; }
      overlay.remove();
      await loadPosts();
      drawCalendarSection();
      toast('Post eliminado');
    };
  }
}
</script>
</body>
</html>
